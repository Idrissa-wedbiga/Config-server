server:
  port: ${PORT:8888}         # Port standard du Config Server

spring:
  application:
    name: config-server

  cloud:
    config:
      server:
        git:
           uri: https://github.com/Idrissa-wedbiga/Config-server
           default-label: main
           search-paths: src/main/resources/configurations
        clone-on-start: true

management:
  endpoints:
    web:
      exposure:
        include: health, info