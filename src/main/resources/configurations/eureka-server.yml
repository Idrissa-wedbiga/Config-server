server:
  port: ${PORT:8761}

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: eureka-server.onrender.com
    secure-port-enabled: true
    non-secure-port-enabled: false

  client:
    register-with-eureka: false
    fetch-registry: false

  server:
    enable-self-preservation: false